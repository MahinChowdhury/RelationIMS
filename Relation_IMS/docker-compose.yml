version: '3.8'

services:
  postgres:
    image: postgres:latest
    container_name: relationims-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: RelationIMS
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - relationims-network

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin4
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    depends_on:
      - postgres
    networks:
      - relationims-network

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    container_name: azurite
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"
    volumes:
      - azurite_data:/data
    networks:
      - relationims-network

  redis:
    image: redis
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - relationims-network

volumes:
  postgres_data:
  azurite_data:

networks:
  relationims-network:
    driver: bridge
