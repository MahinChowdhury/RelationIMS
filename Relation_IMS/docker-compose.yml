services:
  # =========================================
  # Nginx Reverse Proxy (Unified Gateway)
  # =========================================
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: relationims-nginx
    ports:
      - "8080:80"
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_started
    restart: unless-stopped
    networks:
      - relationims-network

  # =========================================
  # React Frontend (Serves SPA to Nginx)
  # =========================================
  frontend:
    build:
      context: ../Relation_IMS.React
      dockerfile: Dockerfile
    container_name: relationims-frontend
    expose:
      - "3000"
    restart: unless-stopped
    networks:
      - relationims-network

  # =========================================
  # .NET API
  # =========================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: relationims-api
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Production}
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      - ConnectionStrings__HangfireConnection=Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      - Finbuckle__MultiTenant__Stores__ConfigurationStore__Tenants__0__Id=tenant-relationims
      - Finbuckle__MultiTenant__Stores__ConfigurationStore__Tenants__0__Identifier=RelationIms
      - Finbuckle__MultiTenant__Stores__ConfigurationStore__Tenants__0__Name=Relation IMS
      - Finbuckle__MultiTenant__Stores__ConfigurationStore__Tenants__0__ConnectionString=Host=postgres;Port=5432;Database=RelationIMS;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      - Finbuckle__MultiTenant__Stores__ConfigurationStore__Tenants__1__Id=tenant-yoloims
      - Finbuckle__MultiTenant__Stores__ConfigurationStore__Tenants__1__Identifier=YoloIms
      - Finbuckle__MultiTenant__Stores__ConfigurationStore__Tenants__1__Name=Yolo IMS
      - Finbuckle__MultiTenant__Stores__ConfigurationStore__Tenants__1__ConnectionString=Host=postgres;Port=5432;Database=YoloIMS;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      - Redis__ConnectionString=redis:6379
      - MinIO__Endpoint=${MINIO_ENDPOINT}
      - MinIO__PublicBaseUrl=${MINIO_PUBLIC_URL}
      - MinIO__AccessKey=${MINIO_ACCESS_KEY}
      - MinIO__SecretKey=${MINIO_SECRET_KEY}
      - MinIO__BucketName=${MINIO_BUCKET_NAME}
      - MinIO__UseSSL=${MINIO_USE_SSL}
      - JwtSettings__Issuer=${JWT_ISSUER:-JWTDemoApi}
      - JwtSettings__AccessTokenExpirationMinutes=${JWT_ACCESS_TOKEN_EXPIRATION_MINUTES:-15}
      - JwtSettings__RefreshTokenExpirationDays=${JWT_REFRESH_TOKEN_EXPIRATION_DAYS:-7}
      - AllowedCorsOrigins=${ALLOWED_CORS_ORIGINS:-http://localhost:4200,http://localhost:5173}
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - relationims-network

  # =========================================
  # PostgreSQL
  # =========================================
  postgres:
    image: postgres:18-alpine
    container_name: relationims-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - relationims-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =========================================
  # Redis
  # =========================================
  redis:
    image: redis:7-alpine
    container_name: relationims-redis
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - relationims-network

  # =========================================
  # MinIO Object Storage
  # =========================================
  minio:
    image: minio/minio:latest
    container_name: relationims-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
      - ./minio/cors.json:/etc/minio/cors.json:ro
    ports:
      - "9001:9001"
    expose:
      - "9000"
    restart: unless-stopped
    networks:
      - relationims-network

  # =========================================
  # MinIO Init (CORS Configuration)
  # =========================================
  minio-init:
    image: minio/mc:latest
    container_name: relationims-minio-init
    depends_on:
      minio:
        condition: service_started
    volumes:
      - ./minio/cors.json:/cors.json:ro
      - ./minio/init-cors.sh:/init-cors.sh:ro
    entrypoint: ["/bin/sh", "/init-cors.sh"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    restart: "no"
    networks:
      - relationims-network


  # =========================================
  # PgAdmin (development/tools only)
  # =========================================
  pgadmin:
    image: dpage/pgadmin4
    container_name: relationims-pgadmin
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: 'True'
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - relationims-network
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:

networks:
  relationims-network:
    driver: bridge