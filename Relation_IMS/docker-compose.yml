services:
  # =========================================
  # Nginx Reverse Proxy (Unified Gateway)
  # =========================================
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: relationims-nginx
    ports:
      - "8080:80"
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_started
    restart: unless-stopped
    networks:
      - relationims-network

  # =========================================
  # React Frontend (Serves SPA to Nginx)
  # =========================================
  frontend:
    build:
      context: ../Relation_IMS.React
      dockerfile: Dockerfile
    container_name: relationims-frontend
    expose:
      - "3000"
    restart: unless-stopped
    networks:
      - relationims-network

  # =========================================
  # .NET API
  # =========================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: relationims-api
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Production}
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      - Redis__ConnectionString=redis:6379
      - AzureStorage__ConnectionString=${AZURE_STORAGE_CONNECTION_STRING}
      - JwtSettings__Issuer=${JWT_ISSUER:-JWTDemoApi}
      - JwtSettings__AccessTokenExpirationMinutes=${JWT_ACCESS_TOKEN_EXPIRATION_MINUTES:-15}
      - JwtSettings__RefreshTokenExpirationDays=${JWT_REFRESH_TOKEN_EXPIRATION_DAYS:-7}
      - AllowedCorsOrigins=${ALLOWED_CORS_ORIGINS:-http://localhost:4200,http://localhost:5173}
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - relationims-network

  # =========================================
  # PostgreSQL
  # =========================================
  postgres:
    image: postgres:16-alpine
    container_name: relationims-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - relationims-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =========================================
  # Redis
  # =========================================
  redis:
    image: redis:7-alpine
    container_name: relationims-redis
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - relationims-network

  # =========================================
  # Azure Blob Storage Emulator
  # =========================================
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    container_name: relationims-azurite
    command: azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0 --location /data --debug /data/debug.log
    volumes:
      - azurite_data:/data
    expose:
      - "10000"
      - "10001"
      - "10002"
    restart: unless-stopped
    networks:
      - relationims-network


  # =========================================
  # PgAdmin (development/tools only)
  # =========================================
  pgadmin:
    image: dpage/pgadmin4
    container_name: relationims-pgadmin
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - tools
    networks:
      - relationims-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  azurite_data:

networks:
  relationims-network:
    driver: bridge