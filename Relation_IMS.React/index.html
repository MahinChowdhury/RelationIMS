<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="Relation IMS - Inventory Management System for efficient stock tracking, order management, and business operations" />
  <meta name="keywords" content="inventory management, stock tracking, order management, warehouse, IMS" />
  <meta name="author" content="Relation IMS" />
  <meta name="theme-color" id="theme-color-meta" content="#f8fcf9" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  
  <meta property="og:title" content="Relation IMS - Inventory Management System" />
  <meta property="og:description" content="Efficient inventory management system for tracking stock, orders, and business operations" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Relation IMS" />
  
  <title>Relation IMS - Inventory Management System</title>
  
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/favicon.svg" />
  
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Noto+Sans:wght@400;500;700&display=swap"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet" />

  <script>
    const isDark = localStorage.getItem('app-theme') === 'dark';
    if (isDark) {
      document.documentElement.classList.add('dark');
      document.getElementById('theme-color-meta').setAttribute('content', '#112116');
    } else {
      document.documentElement.classList.remove('dark');
      document.getElementById('theme-color-meta').setAttribute('content', '#f8fcf9');
    }
  </script>

  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
